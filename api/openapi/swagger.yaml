basePath: /api
definitions:
  mapper.AssignRoleReq:
    properties:
      role:
        enum:
        - owner
        - administrator
        - vip
        type: string
      room_id:
        type: string
      user_id:
        type: string
    required:
    - role
    - room_id
    - user_id
    type: object
  mapper.CheckPermissionResp:
    properties:
      has_permission:
        type: boolean
    type: object
  mapper.CreateRoomReq:
    properties:
      description:
        maxLength: 1000
        type: string
      title:
        maxLength: 30
        minLength: 1
        type: string
    required:
    - title
    type: object
  mapper.DanmakuResp:
    properties:
      content:
        type: string
      created_at:
        type: integer
      id:
        type: string
      mentioned_user_id:
        type: string
      room_id:
        type: string
      type:
        type: integer
      user_id:
        type: string
      username:
        type: string
    type: object
  mapper.GetMuteListResp:
    properties:
      mutes:
        items:
          $ref: '#/definitions/mapper.MuteResp'
        type: array
    type: object
  mapper.GiftRecordResp:
    properties:
      amount:
        type: integer
      anchor_id:
        type: string
      created_at:
        type: integer
      gift_id:
        type: string
      idempotency_key:
        type: string
      room_id:
        type: string
      status:
        description: pending, success, failed
        type: string
      updated_at:
        type: integer
      user_id:
        type: string
    type: object
  mapper.GiftResp:
    properties:
      cache_key:
        type: string
      created_at:
        type: integer
      description:
        type: string
      icon_url:
        type: string
      id:
        type: string
      name:
        type: string
      price:
        type: integer
      status:
        description: online, offline, limited_time
        type: string
      updated_at:
        type: integer
      vip_only:
        type: boolean
    type: object
  mapper.IsMutedResp:
    properties:
      is_muted:
        type: boolean
    type: object
  mapper.LeaderboardEntryResp:
    properties:
      rank:
        type: integer
      score:
        description: 累计送礼金额
        type: integer
      user_id:
        type: string
    type: object
  mapper.LeaderboardResp:
    properties:
      entries:
        items:
          $ref: '#/definitions/mapper.LeaderboardEntryResp'
        type: array
      room_id:
        type: string
    type: object
  mapper.ListGiftsResp:
    properties:
      gifts:
        items:
          $ref: '#/definitions/mapper.GiftResp'
        type: array
    type: object
  mapper.LoginReq:
    properties:
      email:
        type: string
      password:
        maxLength: 100
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  mapper.LoginResp:
    properties:
      access_token:
        type: string
      email:
        type: string
      refresh_token:
        type: string
      user_id:
        type: string
      username:
        type: string
    type: object
  mapper.MuteResp:
    properties:
      admin_id:
        type: string
      created_at:
        type: integer
      duration:
        type: integer
      expires_at:
        type: integer
      muted_at:
        type: integer
      reason:
        type: string
      room_id:
        type: string
      user_id:
        type: string
    type: object
  mapper.MuteUserReq:
    properties:
      duration:
        minimum: 1
        type: integer
      reason:
        maxLength: 200
        type: string
      room_id:
        type: string
      user_id:
        type: string
    required:
    - duration
    - room_id
    - user_id
    type: object
  mapper.RegisterReq:
    properties:
      email:
        type: string
      password:
        maxLength: 100
        minLength: 6
        type: string
      username:
        maxLength: 30
        minLength: 1
        type: string
    required:
    - email
    - password
    - username
    type: object
  mapper.RegisterResp:
    properties:
      email:
        type: string
      user_id:
        type: string
      username:
        type: string
    type: object
  mapper.RemoveRoleReq:
    properties:
      room_id:
        type: string
      user_id:
        type: string
    required:
    - room_id
    - user_id
    type: object
  mapper.RoomResp:
    properties:
      created_at:
        type: integer
      description:
        type: string
      is_active:
        type: boolean
      owner_id:
        type: string
      room_id:
        type: string
      title:
        type: string
      updated_at:
        type: integer
    type: object
  mapper.SendDanmakuReq:
    properties:
      content:
        maxLength: 500
        minLength: 1
        type: string
      mentioned_user_id:
        type: string
      room_id:
        type: string
      type:
        maximum: 3
        minimum: 0
        type: integer
      user_id:
        type: string
      username:
        type: string
    required:
    - content
    - room_id
    - type
    - user_id
    - username
    type: object
  mapper.SendGiftReq:
    properties:
      amount:
        type: integer
      anchor_id:
        type: string
      gift_id:
        type: string
      idempotency_key:
        type: string
      room_id:
        type: string
      user_id:
        type: string
    required:
    - amount
    - anchor_id
    - gift_id
    - idempotency_key
    - room_id
    - user_id
    type: object
  mapper.UnmuteUserReq:
    properties:
      room_id:
        type: string
      user_id:
        type: string
    required:
    - room_id
    - user_id
    type: object
  mapper.UserResp:
    properties:
      email:
        type: string
      is_active:
        type: boolean
      user_id:
        type: string
      username:
        type: string
    type: object
  mapper.UserRoomRoleResp:
    properties:
      created_at:
        type: integer
      permissions:
        items:
          type: integer
        type: array
      role:
        type: string
      room_id:
        type: string
      updated_at:
        type: integer
      user_id:
        type: string
    type: object
  mapper.WalletResp:
    properties:
      balance:
        type: integer
      created_at:
        type: integer
      updated_at:
        type: integer
      user_id:
        type: string
      version_number:
        description: 乐观锁版本号
        type: integer
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: 直播互动引擎 - API 网关服务
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Live Interact Engine - API Service
  version: "1.0"
paths:
  /v1/danmaku/send:
    post:
      consumes:
      - application/json
      description: 在房间内发送弹幕消息
      parameters:
      - description: Bearer Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 发送弹幕请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/mapper.SendDanmakuReq'
      produces:
      - application/json
      responses:
        "200":
          description: 弹幕信息
          schema:
            $ref: '#/definitions/mapper.DanmakuResp'
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未授权
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: 发送弹幕
      tags:
      - Danmaku
  /v1/danmaku/subscribe:
    get:
      description: 通过 SSE 实时订阅房间内的弹幕消息
      parameters:
      - description: Bearer Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 房间ID
        in: query
        name: room_id
        required: true
        type: string
      - description: 用户ID
        in: query
        name: user_id
        required: true
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: 实时弹幕流
          schema:
            $ref: '#/definitions/mapper.DanmakuResp'
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未授权
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: 订阅房间弹幕
      tags:
      - Danmaku
  /v1/gift/list:
    get:
      description: 获取平台全量礼物列表
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/mapper.ListGiftsResp'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: 获取礼物列表
      tags:
      - Gifts
  /v1/gift/send:
    post:
      consumes:
      - application/json
      description: 用户向主播发送礼物，扣除用户钱包余额，生成礼物赠送记录
      parameters:
      - description: Bearer Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 请求体
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/mapper.SendGiftReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/mapper.GiftRecordResp'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: 发送礼物
      tags:
      - Gifts
  /v1/leaderboard/{room_id}:
    get:
      description: 获取指定房间的礼物赠送排行榜 (按累计送礼金额降序)
      parameters:
      - description: 房间 ID (UUID)
        in: path
        name: room_id
        required: true
        type: string
      - default: 100
        description: 返回前 N 名 (默认 100, 最大 1000)
        in: query
        name: top_n
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/mapper.LeaderboardResp'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: 获取房间排行榜
      tags:
      - Leaderboard
  /v1/room/{room_id}:
    get:
      description: 根据房间ID获取房间详细信息
      parameters:
      - description: 房间ID
        in: path
        name: room_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 房间信息
          schema:
            $ref: '#/definitions/mapper.RoomResp'
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 房间不存在
          schema:
            additionalProperties: true
            type: object
      summary: 获取房间信息
      tags:
      - Room
  /v1/room/{room_id}/mute-list:
    get:
      description: 获取房间中被禁言的用户列表
      parameters:
      - description: 房间ID
        in: path
        name: room_id
        required: true
        type: string
      - default: 0
        description: 分页偏移量
        in: query
        name: offset
        type: integer
      - default: 10
        description: 分页大小
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 禁言列表
          schema:
            $ref: '#/definitions/mapper.GetMuteListResp'
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
      summary: 获取禁言列表
      tags:
      - Room
  /v1/room/{room_id}/user/{user_id}/mute-info:
    get:
      description: 获取用户在房间的禁言详细信息
      parameters:
      - description: 房间ID
        in: path
        name: room_id
        required: true
        type: string
      - description: 用户ID
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 禁言信息
          schema:
            $ref: '#/definitions/mapper.MuteResp'
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
      summary: 获取禁言信息
      tags:
      - Room
  /v1/room/{room_id}/user/{user_id}/mute-status:
    get:
      description: 检查用户是否在房间中被禁言
      parameters:
      - description: 房间ID
        in: path
        name: room_id
        required: true
        type: string
      - description: 用户ID
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 禁言状态
          schema:
            $ref: '#/definitions/mapper.IsMutedResp'
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
      summary: 检查禁言状态
      tags:
      - Room
  /v1/room/{room_id}/user/{user_id}/permission/{permission}:
    get:
      description: 检查用户是否拥有指定权限
      parameters:
      - description: 房间ID
        in: path
        name: room_id
        required: true
        type: string
      - description: 用户ID
        in: path
        name: user_id
        required: true
        type: string
      - description: 权限值
        in: path
        name: permission
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 权限检查结果
          schema:
            $ref: '#/definitions/mapper.CheckPermissionResp'
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
      summary: 检查用户权限
      tags:
      - Room
  /v1/room/{room_id}/user/{user_id}/role:
    get:
      description: 获取用户在指定房间的角色和权限信息
      parameters:
      - description: 房间ID
        in: path
        name: room_id
        required: true
        type: string
      - description: 用户ID
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 用户角色信息
          schema:
            $ref: '#/definitions/mapper.UserRoomRoleResp'
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 角色不存在
          schema:
            additionalProperties: true
            type: object
      summary: 获取用户角色
      tags:
      - Room
  /v1/room/assign-role:
    post:
      consumes:
      - application/json
      description: 房间所有者为用户分配角色和权限
      parameters:
      - description: 分配角色请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/mapper.AssignRoleReq'
      produces:
      - application/json
      responses:
        "200":
          description: 操作成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未授权
          schema:
            additionalProperties: true
            type: object
      summary: 分配用户角色
      tags:
      - Room
  /v1/room/create:
    post:
      consumes:
      - application/json
      description: 用户创建一个新房间
      parameters:
      - description: 创建房间请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/mapper.CreateRoomReq'
      produces:
      - application/json
      responses:
        "200":
          description: 房间信息
          schema:
            $ref: '#/definitions/mapper.RoomResp'
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未授权
          schema:
            additionalProperties: true
            type: object
      summary: 创建房间
      tags:
      - Room
  /v1/room/mute:
    post:
      consumes:
      - application/json
      description: 房间管理员禁言指定用户
      parameters:
      - description: 禁言用户请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/mapper.MuteUserReq'
      produces:
      - application/json
      responses:
        "200":
          description: 操作成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未授权
          schema:
            additionalProperties: true
            type: object
      summary: 禁言用户
      tags:
      - Room
  /v1/room/remove-role:
    post:
      consumes:
      - application/json
      description: 房间所有者移除用户权限
      parameters:
      - description: 移除权限请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/mapper.RemoveRoleReq'
      produces:
      - application/json
      responses:
        "200":
          description: 操作成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未授权
          schema:
            additionalProperties: true
            type: object
      summary: 移除用户权限
      tags:
      - Room
  /v1/room/unmute:
    post:
      consumes:
      - application/json
      description: 房间管理员解除用户禁言
      parameters:
      - description: 解除禁言请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/mapper.UnmuteUserReq'
      produces:
      - application/json
      responses:
        "200":
          description: 操作成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未授权
          schema:
            additionalProperties: true
            type: object
      summary: 解除禁言
      tags:
      - Room
  /v1/user/{user_id}:
    get:
      description: 根据用户ID获取用户详细信息
      parameters:
      - description: 用户ID
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 用户信息
          schema:
            $ref: '#/definitions/mapper.UserResp'
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 用户不存在
          schema:
            additionalProperties: true
            type: object
      summary: 获取用户信息
      tags:
      - User
  /v1/user/login:
    post:
      consumes:
      - application/json
      description: 用户使用邮箱和密码登录，返回 Token
      parameters:
      - description: 登录请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/mapper.LoginReq'
      - description: 设备ID
        in: header
        name: X-Device-ID
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            $ref: '#/definitions/mapper.LoginResp'
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 认证失败
          schema:
            additionalProperties: true
            type: object
      summary: 用户登录
      tags:
      - User
  /v1/user/register:
    post:
      consumes:
      - application/json
      description: 创建新用户账户
      parameters:
      - description: 注册请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/mapper.RegisterReq'
      produces:
      - application/json
      responses:
        "200":
          description: 注册成功
          schema:
            $ref: '#/definitions/mapper.RegisterResp'
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 用户注册
      tags:
      - User
  /v1/wallet/{user_id}/balance:
    get:
      description: 获取指定用户的钱包余额（通常获取自己的钱包）
      parameters:
      - description: Bearer Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 用户 ID (UUID)
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/mapper.WalletResp'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: 获取钱包余额
      tags:
      - Wallet
swagger: "2.0"
