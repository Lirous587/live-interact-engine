syntax = "proto3";

package user;

option go_package = "shared/proto/user;user";

import "user/user.proto";

// ==================== UserService Request/Response Messages ====================

message RegisterRequest {
  string email    = 1;
  string username = 2;
  string password = 3;
}

message RegisterResponse {
  User user = 1;
}

message LoginRequest {
  string               email    = 1;
  string               password = 2;
  UserIdentityMetadata metadata = 3;
}

message LoginResponse {
  User      user       = 1;
  TokenPair token_pair = 2;
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  User user = 1;
}

// ==================== TokenService Request/Response Messages ====================

enum TokenStatus {
  TOKEN_STATUS_UNSPECIFIED = 0;
  TOKEN_STATUS_VALID       = 1;
  TOKEN_STATUS_EXPIRED     = 2;
  TOKEN_STATUS_INVALID     = 3;
}

message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  TokenStatus  status  = 1;
  TokenPayload payload = 2;
}

message ParseTokenRequest {
  string access_token = 1;
}

message ParseTokenResponse {
  TokenPayload payload = 1;
  TokenStatus  status  = 2;
}

message RefreshTokenRequest {
  UserIdentity user_identity = 1;
  string       refresh_token = 2;
}

message RefreshTokenResponse {
  TokenPair token_pair = 1;
}
