syntax = "proto3";

package user;

option go_package = "shared/proto/user;user";

// 权限枚举
enum Permission {
  PERMISSION_UNSPECIFIED = 0;
  DANMAKU_SEND           = 1; // 发送普通弹幕
  DANMAKU_PIN            = 2; // 发送精选/固定弹幕
  DANMAKU_DELETE         = 3; // 删除弹幕
  USER_MANAGE            = 4; // 用户管理
  ROLE_MANAGE            = 5; // 角色管理
}

// 用户基础信息
message User {
  string user_id    = 1;
  string username   = 2;
  string email      = 3;
  int64  created_at = 4; // Unix timestamp
  int64  updated_at = 5; // Unix timestamp
  bool   is_active  = 6;
}

// 用户房间角色信息
message UserRoomRole {
  string              user_id     = 1;
  string              room_id     = 2;
  string              role_name   = 3;
  bool                is_owner    = 4; // 是否是房主
  repeated Permission permissions = 5; // 具体权限列表
  int64               created_at  = 6; // Unix timestamp
  int64               updated_at  = 7; // Unix timestamp
}

message UserIdentity {
  string user_id   = 1;
  string device_id = 2;
}

// Token 相关
message TokenPayload {
  UserIdentity user_identity = 1;
  int64        iss_at        = 2; // Unix timestamp
  int64        exp_at        = 3; // Unix timestamp
}

// Token 对信息
message TokenPair {
  string access_token       = 1;
  string refresh_token      = 2;
  int64  access_expires_at  = 3; // Unix timestamp
  int64  refresh_expires_at = 4; // Unix timestamp
}

// 注册请求
message RegisterRequest {
  string email    = 1;
  string username = 2;
  string password = 3;
}

// 注册响应（只返回用户信息）
message RegisterResponse {
  User user = 1;
}

// 登录请求
message LoginRequest {
  string email     = 1;
  string password  = 2;
  string device_id = 3;
}

// 登录响应（返回用户信息和 token）
message LoginResponse {
  User      user       = 1;
  TokenPair token_pair = 2;
}
