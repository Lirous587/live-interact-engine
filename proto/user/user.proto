syntax = "proto3";

package user;

option go_package = "live-interact-engine/shared/proto/user";

import "user/types.proto";

// ==================== 获取用户信息 ====================
message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  User user = 1;
}

// ==================== 校验 Token ====================
message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  bool   is_valid      = 1;
  bool   is_expired    = 2;
  string error_message = 3;
}

// ==================== 解析 Token ====================
message ParseTokenRequest {
  string access_token = 1;
}

message ParseTokenResponse {
  TokenPayload payload       = 1;
  string       error_message = 2;
}

// ==================== Refresh Token ====================
message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  TokenPair token_pair    = 1;
  string    error_message = 2;
}

// ==================== 获取房间角色信息 ====================
message GetUserRoomRoleRequest {
  string user_id = 1;
  string room_id = 2;
}

message GetUserRoomRoleResponse {
  UserRoomRole user_room_role = 1;
}

// ==================== 检查房间权限 ====================
message CheckPermissionRequest {
  string     user_id    = 1;
  Permission permission = 2;
  string     room_id    = 3; // 房间 ID
}

message CheckPermissionResponse {
  bool has_permission = 1;
}
