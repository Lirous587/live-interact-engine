syntax = "proto3";

package room;

option go_package = "shared/proto/room;room";

// ==================== Role Enum ====================

enum RoleType {
  ROLE_OWNER         = 0; // 房间所有者：拥有全部权限
  ROLE_ADMINISTRATOR = 1; // 管理员：可删除弹幕、禁言用户
  ROLE_VIP           = 2; // 付费用户：可发送置顶弹幕
}

// ==================== Permission Enum ====================

enum Permission {
  PERMISSION_UNSPECIFIED    = 0;
  PERMISSION_DANMAKU_SEND   = 1;
  PERMISSION_DANMAKU_PIN    = 2;
  PERMISSION_DANMAKU_DELETE = 3;
  PERMISSION_USER_MANAGE    = 4;
  PERMISSION_ROLE_MANAGE    = 5;
}

// ==================== Core Messages ====================

message Room {
  string room_id     = 1;
  string owner_id    = 2;
  string title       = 3;
  string description = 4;
  int64  created_at  = 5;
  int64  updated_at  = 6;
  bool   is_active   = 7;
}

message UserRoomRole {
  string              user_id     = 1;
  string              room_id     = 2;
  RoleType            role        = 3; // 角色类型（对应权限由后端推导）
  repeated Permission permissions = 4; // 权限列表（由后端根据角色自动生成）
  int64               created_at  = 5;
  int64               updated_at  = 6;
}
