syntax = "proto3";

package room;

option go_package = "shared/proto/room;room";

import "room/room_api.proto";

service RoomService {
  rpc CreateRoom(CreateRoomRequest) returns (CreateRoomResponse);
  rpc GetRoom(GetRoomRequest) returns (GetRoomResponse);
  rpc AssignRole(AssignRoleRequest) returns (AssignRoleResponse);
  rpc GetUserRoomRole(GetUserRoomRoleRequest) returns (GetUserRoomRoleResponse);
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse);
  rpc MuteUser(MuteUserRequest) returns (MuteUserResponse);
  rpc UnmuteUser(UnmuteUserRequest) returns (UnmuteUserResponse);
  rpc IsMuted(IsMutedRequest) returns (IsMutedResponse);
  rpc GetMuteList(GetMuteListRequest) returns (GetMuteListResponse);
  rpc GetMuteInfo(GetMuteInfoRequest) returns (GetMuteInfoResponse);
}
