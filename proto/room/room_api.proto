syntax = "proto3";

package room;

option go_package = "shared/proto/room;room";

import "room/room.proto";

// ==================== Request/Response Messages ====================

message CreateRoomRequest {
  string title       = 1;
  string description = 2;
  string owner_id    = 3;
}

message CreateRoomResponse {
  Room room = 1;
}

message GetRoomRequest {
  string room_id = 1;
}

message GetRoomResponse {
  Room room = 1;
}

message AssignRoleRequest {
  string   owner_id = 1;
  string   room_id  = 2;
  string   user_id  = 3;
  RoleType role     = 4; // 要分配的角色（OWNER/ADMINISTRATOR/MEMBER）
}

message AssignRoleResponse {}

message RemoveRoleRequest {
  string owner_id = 1;
  string room_id  = 2;
  string user_id  = 3;
}

message RemoveRoleResponse {}

message GetUserRoomRoleRequest {
  string user_id = 1;
  string room_id = 2;
}

message GetUserRoomRoleResponse {
  UserRoomRole user_room_role = 1;
}

message CheckPermissionRequest {
  string     user_id    = 1;
  string     room_id    = 2;
  Permission permission = 3;
}

message CheckPermissionResponse {
  bool has_permission = 1;
}

// ==================== Mute Messages ====================

message Mute {
  string user_id    = 1;
  string room_id    = 2;
  string admin_id   = 3;
  string reason     = 4;
  int64  duration   = 5;
  int64  muted_at   = 6;
  int64  expires_at = 7;
  int64  created_at = 8;
}

message MuteUserRequest {
  string admin_id = 1;
  string room_id  = 2;
  string user_id  = 3;
  int64  duration = 4;
  string reason   = 5;
}

message MuteUserResponse {}

message UnmuteUserRequest {
  string room_id  = 1;
  string user_id  = 2;
  string admin_id = 3;
}

message UnmuteUserResponse {}

message IsMutedRequest {
  string room_id = 1;
  string user_id = 2;
}

message IsMutedResponse {
  bool is_muted = 1;
}

message GetMuteListRequest {
  string room_id = 1;
  int32  offset  = 2;
  int32  limit   = 3;
}

message GetMuteListResponse {
  repeated Mute mutes = 1;
}

message GetMuteInfoRequest {
  string room_id = 1;
  string user_id = 2;
}

message GetMuteInfoResponse {
  Mute mute = 1;
}
