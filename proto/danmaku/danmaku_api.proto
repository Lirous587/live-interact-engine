syntax = "proto3";

package danmaku;

option go_package = "shared/proto/danmaku;danmaku";

import "danmaku/danmaku.proto";

// ==================== Request/Response Messages ====================

message SendDanmakuRequest {
  string      room_id           = 1;
  string      user_id           = 2;
  string      username          = 3;
  string      content           = 4;
  DanmakuType type              = 5;
  string      mentioned_user_id = 6; // ← 可选，空字符串表示没有 mention
}

message SendDanmakuResponse {
  Danmaku danmaku = 1; // 创建的弹幕
  string  message = 2; // 状态信息
}

message SubscribeDanmakuRequest {
  string room_id = 1;
  string user_id = 2;
}

message SubscribeDanmakuResponse {
  Danmaku danmaku = 1;
}
