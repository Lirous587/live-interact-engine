syntax = "proto3";

package danmaku;

option go_package = "shared/proto/danmaku;danmaku";

import "danmaku/danmaku_api.proto";

service DanmakuService {
  rpc SendDanmaku(SendDanmakuRequest) returns (SendDanmakuResponse);
  rpc SubscribeDanmaku(SubscribeDanmakuRequest) returns (stream SubscribeDanmakuResponse);
}
