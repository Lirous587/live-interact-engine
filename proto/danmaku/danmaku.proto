syntax = "proto3";

package danmaku;

option go_package = "shared/proto/danmaku;danmaku";

import "google/protobuf/timestamp.proto";

// ==================== Enums ====================

enum DanmakuType {
  DANMAKU_TYPE_NORMAL = 0;
  DANMAKU_TYPE_SUPER  = 1;
  DANMAKU_TYPE_GIFT   = 2;
  DANMAKU_TYPE_PINNED = 3;
}

enum RoomState {
  ROOM_STATE_UNSPECIFIED = 0;
  ROOM_STATE_ACTIVE      = 1; // 直播中
  ROOM_STATE_CLOSED      = 2; // 已关闭
  ROOM_STATE_HIDDEN      = 3; // 隐藏
}

// ==================== Core Messages ====================

message Danmaku {
  string                    id                = 1;
  string                    room_id           = 2;
  string                    user_id           = 3;
  string                    username          = 4;
  string                    content           = 5;
  DanmakuType               type              = 6;
  google.protobuf.Timestamp created_at        = 7;
  string                    mentioned_user_id = 8;
}

message Room {
  string                    id            = 1;
  string                    host_id       = 2; // 主播id
  string                    title         = 3;
  RoomState                 state         = 4;
  int32                     viewer_count  = 5;
  google.protobuf.Timestamp created_at    = 6;
  repeated string           blocked_users = 7; // 禁言用户
}
