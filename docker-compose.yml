name: live-interact-engine-infra

services:
  # API Service - 本地应用
  api-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-service
    ports:
      - "8080:8080" # API 端口
      - "9100:9100" # Metrics 端口
    environment:
      # 服务配置
      - SERVER_MODE=dev
      - SERVER_PORT=8080
      - SERVER_ALLOW_ORIGINS=*

      # 日志配置
      - LOG_LEVEL=debug
      - LOG_FILENAME=logs/api-service.log
      - LOG_MAX_SIZE=100
      - LOG_MAX_AGE=7
      - LOG_MAX_BACKUPS=5

      # 链路追踪
      - TRACE_SAMPLE_RATE=1.0
      - JAEGER_ENDPOINT=jaeger:4318

      # 指标
      - METRICS_PORT=9100

      # 依赖服务
      - DANMAKU_SERVICE_URL=danmaku-service:9093
      - USER_SERVICE_URL=user-service:9094
    depends_on:
      - jaeger
      - user-service
    networks:
      - live-interact

  danmaku-service:
    build:
      context: .
      dockerfile: Dockerfile-danmaku
    container_name: danmaku-service
    ports:
      - "9093:9093" # API 端口
    environment:
      # 服务配置
      - GRPC_ADDR=:9093

      # 日志配置
      - LOG_LEVEL=dev
      - LOG_FILENAME=logs/danmaku-service.log
      - LOG_MAX_SIZE=100
      - LOG_MAX_AGE=7
      - LOG_MAX_BACKUPS=5

      # 链路追踪（如果需要）
      - JAEGER_ENDPOINT=jaeger:4318
    networks:
      - live-interact

  # User Service
  user-service:
    build:
      context: .
      dockerfile: Dockerfile-user
    container_name: user-service
    ports:
      - "9094:9094" # gRPC API 端口
    environment:
      # 服务配置
      - GRPC_ADDR=:9094

      # 日志配置
      - LOG_LEVEL=debug
      - LOG_FILENAME=logs/user-service.log
      - LOG_MAX_SIZE=100
      - LOG_MAX_AGE=7
      - LOG_MAX_BACKUPS=5

      # Token 配置
      - TOKEN_ACCESS_EXPIRES_SECONDS=300 # 5 分钟
      - TOKEN_ACCESS_SECRET=your-secret-key-change-this
      - TOKEN_REFRESH_EXPIRES_SECONDS=2592000 # 30 天

      # Redis 配置
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0

      # PostgreSQL 配置
      - DATABASE_DSN=postgres://postgres:password@postgres:5432/user_service?sslmode=disable
      - POSTGRES_MAX_CONNS=25
      - POSTGRES_MIN_CONNS=5
      - POSTGRES_MAX_CONN_LIFETIME_SECONDS=300
      - POSTGRES_MAX_CONN_IDLE_TIME_SECONDS=60

      # 链路追踪
      - JAEGER_ENDPOINT=jaeger:4318
    depends_on:
      - jaeger
      - redis
      - postgres
    networks:
      - live-interact

  # Redis
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - live-interact

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      # 初始数据库
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d
    command:
      - "postgres"
      - "-c"
      - "log_statement=all"
      - "-c"
      - "log_duration=on"
    networks:
      - live-interact

  # Jaeger - 链路追踪
  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    container_name: jaeger
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
      - "14250:14250" # gRPC
      - "14268:14268" # HTTP collector
      - "9411:9411" # Zipkin
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    networks:
      - live-interact

  # Prometheus - 指标采集
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - live-interact
    depends_on:
      - jaeger

  # Grafana - 数据可视化
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - live-interact
    depends_on:
      - prometheus

networks:
  live-interact:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  redis_data:
  postgres_data:
