apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: live-interact
  labels:
    app: user-service
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - user-service
                topologyKey: kubernetes.io/hostname
      containers:
        - name: user-service
          image: live-interact/user-service:latest
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 9094
          env:
            - name: LOG_LEVEL
              value: "info"
            - name: ENV
              value: "production"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command: ["grpc_health_probe", "-addr=:9094"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["grpc_health_probe", "-addr=:9094"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 2
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: live-interact
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
    - name: grpc
      port: 9094
      targetPort: 9094
